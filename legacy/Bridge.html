    if(adminU2&&adminU2.id!==mgrId)DB.notifications.unshift({id:uid('n'),userId:adminU2.id,text:apprText,time:new Date().toISOString(),read:false});
  }
  log(fullName(u),'Submitted '+run.status,c.name);
  // Process escalations — only on first submission, not resubmits
  if(!isResub)_processEscalations(clId,date,run.questionResponses||[]);
  const _origQR=JSON.parse(JSON.stringify(run.questionResponses||[]));
  const _subId=run.id;
  const _inlineP=r=>(Array.isArray(r.photos)&&r.photos.some(p=>typeof p==='string'&&p.startsWith('data:')))||(typeof r.photo==='string'&&r.photo.startsWith('data:'));
  const _hasInlinePhoto=_origQR.some(_inlineP);
  // Strip base64 photos before sending to Supabase (store placeholder; real URLs added below)
  const _stripP=p=>(typeof p==='string'&&p.startsWith('data:'))?'[photo]':p;
  const _mkRow=qr=>({id:_subId,checklist_id:clId,user_id:S.uid,date,status:run.status,submitted_at:run.submittedAt,tasks:run.tasks,question_responses:qr,edit_count:run.editCount||0,edit_history:run.editHistory||[]});
  const srQR=(run.questionResponses||[]).map(r=>{const o={...r};if(Array.isArray(o.photos))o.photos=o.photos.map(_stripP);if(o.photo)o.photo=_stripP(o.photo);return o;});
  // Mark the Submit button busy so the user waits while photos upload. The OLD bug was that the
  // photo upload ran fire-and-forget AFTER 'Submitted', so if the tab was closed the images
  // never reached the server — managers then saw responses but no photos.
  const _sbtn=document.querySelector('.submit-pill[data-cl="'+clId+'"]');
  if(_sbtn){_sbtn.disabled=true;_sbtn.style.opacity='.6';_sbtn.style.pointerEvents='none';_sbtn.textContent=_hasInlinePhoto?'Uploading photos…':'Saving…';}
  saveDB();
  // 1. Save the response text immediately (photos as placeholders) — safety net so a submission
  //    is NEVER lost even if a photo upload fails.
  let _txtOk=false;
  for(let attempt=0;attempt<3&&!_txtOk;attempt++){
    if(attempt>0)await new Promise(res=>setTimeout(res,500*attempt));
    try{const {error}=await sb.from('submissions').upsert(_mkRow(srQR),{onConflict:'id'});_txtOk=!error;if(error)console.warn('sub upsert:',error.message);}
    catch(e){console.warn('sub upsert:',e&&e.message);}
  }
  // Submitted successfully → remove any saved draft for this checklist/date (local + server).
  if(_txtOk)_clearDraft(clId,date);
  // 2. Upload photos to Storage NOW (foreground, awaited) and re-save the submission with the
  //    durable public URLs, so managers/admins can see them. This is the core fix.
  if(_hasInlinePhoto){
    try{
      const uploadedQR=await _uploadSubmissionPhotos(clId,S.uid,date,_origQR);
      const rec=DB.submissions.find(s=>s.id===_subId);
      if(rec)rec.questionResponses=uploadedQR;
      saveDB();
      const anyUrl=uploadedQR.some(r=>(Array.isArray(r.photos)&&r.photos.some(p=>typeof p==='string'&&p.startsWith('http')))||(typeof r.photo==='string'&&r.photo.startsWith('http')));
      if(anyUrl){try{await sb.from('submissions').upsert(_mkRow(uploadedQR),{onConflict:'id'});}catch(e){console.warn('[photo re-upsert]',e&&e.message);}}
      const _lost=uploadedQR.some(r=>(Array.isArray(r.photos)&&r.photos.includes('[photo]'))||r.photo==='[photo]');
      if(_lost)toast('⚠ Some photos couldn’t be uploaded — please re-open the checklist and re-attach them','warn');
    }catch(e){console.warn('[photo persist]',e&&e.message);toast('⚠ Photos couldn’t be uploaded — submission saved without them','warn');}
  }
  // 3. Finalize the UI now that text + photos are persisted.
  toast(needsAppr?'Submitted — pending approval':'Submitted ✓',late||needsAppr?'warn':'ok');
  delete RUN[clId];S.expandedCl=null;_invalidateNotifCache();_touchAction();render();
  // 4. Background: sync notifications / approvals / tickets (non-blocking).
  Promise.allSettled([
    DB.approvals.length?sb.from('approvals').upsert(DB.approvals.map(a=>({id:a.id,type:a.type||'Submission',requester_id:a.requesterId,checklist_id:a.checklistId||null,date:a.date||null,status:a.status,note:a.note||'',is_resubmit:a.isResubmit||false,used_at:a.usedAt||null})),{onConflict:'id'}):Promise.resolve(),
    sb.from('notifications').upsert(DB.notifications.slice(0,50).map(n=>({id:n.id,user_id:n.userId,text:n.text,read:n.read||false,created_at:n.time||new Date().toISOString()})),{onConflict:'id'}),
    // ⚠ Tickets are intentionally NOT mirrored here anymore (same reason as _sync): a stale
    //   browser could resurrect a just-deleted ticket. Escalation tickets are inserted directly
    //   to Supabase at creation time, so this bulk upsert is redundant.
  ]).catch(()=>{});
};
function _clearDraft(clId,date){
  const draftId='draft_'+clId+'__'+S.uid+'__'+date;
  DB.drafts=(DB.drafts||[]).filter(d=>d.id!==draftId);
  sb.from('submission_drafts').delete().eq('id',draftId).then(()=>{}).catch(e=>console.warn('[draft] clear:',e&&e.message));
}
// Save the current in-progress answers (all questions together) as a draft — no validation,
// stored server-side so it survives refresh and syncs across devices. Cleared on submit.
App._saveDraft=async(clId,date)=>{
  const run=RUN[clId];
  if(!run){toast('Open the checklist first','warn');return;}
  const _btn=document.querySelector('.draft-pill[data-cl="'+clId+'"]');
  if(_btn){_btn.disabled=true;_btn.style.opacity='.6';_btn.style.pointerEvents='none';_btn.textContent='Saving…';}
  // Upload any NEW base64 photos to Storage (same helper the submit flow uses) so the draft row
  // stays small and photos are viewable from any device. Already-uploaded URLs are kept as-is.
  // IMPORTANT: if an upload soft-fails (returns a '[photo]' placeholder on a flaky network) we keep
  // the base64 originals so a photo is NEVER silently lost — the user can reopen and re-save to retry.
  const _orig=JSON.parse(JSON.stringify(run.questionResponses||[]));
  let _uploaded=_orig;
  try{_uploaded=await _uploadSubmissionPhotos(clId,S.uid,date,_orig);}catch(e){console.warn('[draft photo]',e&&e.message);_uploaded=_orig;}
  const _photoLost=(_uploaded||[]).some(r=>(Array.isArray(r.photos)&&r.photos.includes('[photo]'))||r.photo==='[photo]');
  const qr=_photoLost?_orig:_uploaded; // on failure keep base64 (safe + still syncs); else durable URLs
  run.questionResponses=JSON.parse(JSON.stringify(qr)); // keep in memory so re-saving won't re-upload the successful ones
  const draftId='draft_'+clId+'__'+S.uid+'__'+date;
  const nowISO=new Date().toISOString();
  const _tasks=JSON.parse(JSON.stringify(run.tasks||[]));
  const row={id:draftId,checklist_id:clId,user_id:S.uid,date:date,question_responses:qr,tasks:_tasks,updated_at:nowISO};
  const rec={id:draftId,checklistId:clId,userId:S.uid,date:date,questionResponses:JSON.parse(JSON.stringify(qr)),tasks:JSON.parse(JSON.stringify(_tasks)),updatedAt:nowISO};
  const di=(DB.drafts=DB.drafts||[]).findIndex(d=>d.id===draftId);
  if(di>-1)DB.drafts[di]=rec;else DB.drafts.push(rec);
  let ok=false;
  for(let attempt=0;attempt<3&&!ok;attempt++){
    if(attempt>0)await new Promise(r=>setTimeout(r,500*attempt));
    try{const{error}=await sb.from('submission_drafts').upsert(row,{onConflict:'id'});ok=!error;if(error)console.warn('[draft] save:',error.message);}
    catch(e){console.warn('[draft] save:',e&&e.message);}
  }
  if(ok){log(fullName(me()),'Saved draft',clById(clId)?.name||'');toast(_photoLost?'Draft saved — but a photo couldn’t upload; reopen the checklist to retry':'Draft saved ✓ — resume on any device',_photoLost?'warn':'ok');}
  else toast('Couldn’t save draft — please retry','err');
  rr();
};
App._reqEdit=(clId,date)=>{openModal(`<div class="p-6"><div class="flex justify-between mb-4"><h2 class="fd text-xl font-bold">Request edit</h2><button onclick="App.closeModal()" class="text-ink-400">${ic('x')}</button></div><p class="text-sm text-ink-400 mb-4">Manager approval required to edit a submission.</p><textarea id="re-n" rows="3" placeholder="Reason for edit…" class="w-full bg-white border border-ink-200 rounded-xl px-3 py-2.5 text-sm rf"></textarea><button onclick="App._sendReq('${clId}','${date}')" style="margin-top:16px;width:100%;background:#15171C;color:#fff;font-weight:600;padding:12px;border-radius:12px;border:none;cursor:pointer">Send request</button></div>`,'max-w-sm');};
App._sendReq=(clId,date)=>{
  const note=$('#re-n')?.value.trim()||'Edit requested';
  const u=me();
  // Guard: prevent duplicate pending edit requests for same checklist+date
  const existingReq=DB.approvals.find(a=>a.type==='Edit Request'&&a.requesterId===S.uid&&a.checklistId===clId&&a.date===date&&a.status==='Pending');
  if(existingReq){toast('Edit request already pending — awaiting manager approval','warn');closeModal();return;}
  DB.approvals.push({id:uid('a'),type:'Edit Request',requesterId:S.uid,checklistId:clId,date,status:'Pending',note,createdAt:new Date().toISOString()});
  // Mark submission status as "Pending Approval" to show in UI
  const sub=DB.submissions.find(s=>s.checklistId===clId&&s.userId===S.uid&&s.date===date);
  if(sub)sub.editRequestStatus='Pending';
  // Notify manager
  const mgrId=u?.managerId;
  const clName=clById(clId)?.name||'a checklist';
  if(mgrId)DB.notifications.unshift({id:uid('n'),userId:mgrId,text:'✏️ Edit request from '+fullName(u)+' for "'+clName+'" on '+fmtS(date),time:new Date().toISOString(),read:false});
  // Notify admin if not same as manager
  const admin=DB.users.find(x=>x.role==='Admin');
  if(admin&&admin.id!==mgrId)DB.notifications.unshift({id:uid('n'),userId:admin.id,text:'Edit request: '+fullName(u)+' — '+clName,time:new Date().toISOString(),read:false});
  _invalidateNotifCache();log(fullName(u),'Edit request',clName);
  toast('Edit request sent to your manager');saveDB();closeModal();render();
};

                    ${(()=>{const pl=_qrPhotoList(qr);return pl.length?'<div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">'+pl.map(ph=>'<img src="'+esc(ph)+'" loading="lazy" decoding="async" alt="Task response photo" onclick="App._bigImg(this.src)" style="max-width:100px;max-height:72px;border-radius:8px;object-fit:cover;border:1px solid #E5E7EB;cursor:pointer" title="Click to enlarge"/>').join('')+'</div>':'';})()}
                  </div>
                </div>`;
              }).join('');
            })()}
            ${sub?`<div style="padding:10px 16px;font-size:11px;color:#9CA3AF;border-top:1px solid #F3F4F6">Submitted ${sub.submittedAt?new Date(sub.submittedAt).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'unknown time'}</div>`:''}
          </div>`:''}
        </div>`;
      }).join(''):`<div style="text-align:center;padding:48px 24px;color:#9CA3AF"><div style="font-size:32px;margin-bottom:8px">📅</div><div style="font-size:14px;font-weight:600">No checklists</div><div style="font-size:13px;margin-top:4px">No checklists scheduled for this date</div></div>`}
    </div>
  </div>`;
}
/* ===== ALL CHECKLISTS (Super Admin + Admin role) ===== */
// Read-only question responses block (adapted from team view)
function _roResponses(c,sub,date){
  if(!sub)return`<div style="padding:14px 16px;font-size:13px;color:#9CA3AF">No submission for ${fmtD(date)}</div>`;
  const qResps=sub.questionResponses||[];
  const qs=(c.questionIds||[]).map(qid=>(DB.questions||[]).find(x=>x.id===qid)).filter(Boolean);
  if(!qs.length)return`<div style="padding:14px 16px;font-size:13px;color:#9CA3AF">No questions in this checklist</div>`;
  const _escSetRo=_subEscalatedQids(c,sub);
  let h=qs.map(q=>{
    const qr=qResps.find(r=>r.questionId===q.id)||{};
    const resp=qr.response;const hasR=resp!==null&&resp!==undefined&&resp!=='';
    const esc1=_escSetRo.has(q.id);
    const boxBg=esc1?'#EF4444':(hasR?'#10B981':'#E5E7EB');
    const ansClr=esc1?'#BE123C':'#0E9F6E';
    return`<div style="padding:10px 14px;border-bottom:1px solid #F9FAFB;display:flex;align-items:center;gap:10px;${esc1?'background:#FFF5F5':''}">
      <div style="width:18px;height:18px;border-radius:5px;background:${boxBg};display:grid;place-items:center;flex-shrink:0">${esc1?'<span style="color:#fff;font-size:12px;font-weight:800;line-height:1">!</span>':(hasR?'<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round"><path d="M20 6 9 17l-5-5"/></svg>':'')}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:12px;font-weight:600;color:${hasR?'#15171C':'#9CA3AF'}">${esc(q.text)}${esc1?'<span style="font-size:9px;font-weight:800;color:#BE123C;background:#FFE4E6;padding:1px 6px;border-radius:8px;margin-left:6px;text-transform:uppercase;letter-spacing:.04em">Flagged</span>':''}</div>
        ${hasR?`<div style="font-size:11px;font-weight:700;color:${ansClr};margin-top:2px">${esc(String(resp))}</div>`:'<div style="font-size:11px;color:#D1D5DB;font-style:italic;margin-top:2px">Not answered</div>'}
        ${qr.comment?`<div style="font-size:11px;color:#6B7280;margin-top:2px;font-style:italic">"${esc(qr.comment)}"</div>`:''}
        ${(()=>{const pl=_qrPhotoList(qr);return pl.length?'<div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">'+pl.map(ph=>'<img src="'+esc(ph)+'" loading="lazy" decoding="async" alt="Task response photo" onclick="App._bigImg(this.src)" style="max-width:100px;max-height:72px;border-radius:8px;object-fit:cover;border:1px solid #E5E7EB;cursor:pointer" title="Click to enlarge"/>').join('')+'</div>':'';})()}
      </div>
    </div>`;
  }).join('');
  const by=sub.userId?uById(sub.userId):null;
  h+=`<div style="padding:10px 16px;font-size:11px;color:#9CA3AF;border-top:1px solid #F3F4F6">Submitted${by?' by <strong>'+esc(fullName(by))+'</strong>':''} ${sub.submittedAt?new Date(sub.submittedAt).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):''}</div>`;
  return h;
}

function allClsPage(){
  const today=todayISO();
  if(S.filters.aclWk===undefined)S.filters.aclWk=0;
  // Week strip (Mon–Sun) — same as Team view
  const ref=new Date(today+'T00:00:00');
  const dow=ref.getDay();
  ref.setDate(ref.getDate()+(dow===0?-6:1-dow)+S.filters.aclWk*7);
  const week=Array.from({length:7},(_,i)=>{const dd=new Date(ref);dd.setDate(dd.getDate()+i);return dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');});
  if(!S.filters.aclDate||!week.includes(S.filters.aclDate)){S.filters.aclDate=week.find(x=>x===today)||week[0];}
  const d=S.filters.aclDate;
  const dep=S.filters.aclDep||'';
  const loc=S.filters.aclLoc||'';
  const filtCls=dd=>DB.checklists.filter(c=>clOn(c,dd)&&(!dep||c.department===dep)&&(!loc||(c.locationIds||[]).includes(loc)));
  // ── Hierarchy scope: Super Admin sees everyone; Admin (SubAdmin) / managers see themselves + their tree (users under them, and users under those users) ──
  const scopeUsers=(isAdmin()||isSubAdmin()
    ? DB.users
    : [me(),...subTree(S.uid)].filter(Boolean)
  ).filter(u=>u.status==='Active');
  const scopeIds=new Set(scopeUsers.map(u=>u.id));
  const cls=filtCls(d);

  // Strip dots: aggregated across ALL users/checklists (respecting filters)
  const dayDots=dd=>{
    const dcls=filtCls(dd);
    let sub=false,pend=false;
    dcls.forEach(c=>{
      if(c.anyOne){
        if(!isAdmin()&&!isSubAdmin()&&!(c.assignees||[]).some(a=>scopeIds.has(a)))return;
        if(DB.submissions.some(x=>x.checklistId===c.id&&x.date===dd&&x.status!=='Editing'))sub=true;else pend=true;
      }
      else (c.assignees||[]).forEach(a=>{if(!scopeIds.has(a))return;if(subFor(c.id,a,dd))sub=true;else pend=true;});
    });
    return{sub,pend,late:pend&&dd<today};
  };

  const BC={'Late':'#F43F5E','Pending Approval':'#F97316','On Time':'#10B981','Submitted':'#10B981','Pending':'#F59E0B','Rejected':'#9F1239','Editing':'#0EA5E9'};

  // One read-only expandable card
  const roCard=(c,sub,key,metaExtra)=>{
    const st=sub?sub.status:(d<today?'Late':'Pending');
    const exp=S.filters.aclExp===key;
    const ansN=sub?(sub.questionResponses||[]).filter(r=>r.response!==null&&r.response!==undefined&&r.response!=='').length:0;
    return`<div style="background:#fff;border-radius:14px;border:1px solid #ECEDF0;border-left:4px solid ${BC[st]||'#D1D5DB'};overflow:hidden">
      <button onclick="S.filters.aclExp=S.filters.aclExp==='${key}'?null:'${key}';rr()" style="width:100%;text-align:left;padding:12px 14px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;gap:10px">
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:700">${esc(c.name)}${c.anyOne?' <span title="Any one assignee can complete" style="font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px;background:#EEF2FF;color:#4338CA">\ud83d\udc65 Any one</span>':''}</div>
          <div style="font-size:12px;color:#9CA3AF;margin-top:2px">${(c.questionIds||[]).length} question${(c.questionIds||[]).length!==1?'s':''}${c.department?' · '+esc(c.department):''}${metaExtra||''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:5px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
          ${sub&&(c.questionIds||[]).length?_subBadges(c,sub,{small:true}):''}
          ${chip(st)}
          <span style="color:#D1D5DB;transform:rotate(${exp?'90':'0'}deg);transition:transform .2s">${ic('chevR','w-4 h-4')}</span>
        </div>
      </button>
      ${exp?`<div style="border-top:1px solid #F3F4F6">${_roResponses(c,sub,d)}</div>`:''}
    </div>`;
  };

  // ── Render one location's section: group ("any one") checklists, then individual checklists user-by-user.
  //    secKey is prefixed into every expand key so the same checklist/user appearing under two
  //    locations expands independently. Returns '' when this section has nothing to show. ──
  const renderSection=(sectionCls,secKey)=>{
    const sgrp=sectionCls.filter(c=>c.anyOne&&(isAdmin()||isSubAdmin()||(c.assignees||[]).some(a=>scopeIds.has(a))));
    const sind=sectionCls.filter(c=>!c.anyOne);
    const sUserMap={};
    sind.forEach(c=>(c.assignees||[]).forEach(uid2=>{if(!scopeIds.has(uid2))return;const u=uById(uid2);if(!u||u.status!=='Active')return;(sUserMap[uid2]=sUserMap[uid2]||[]).push(c);}));
    const sUserIds=Object.keys(sUserMap).sort((a,b)=>fullName(uById(a)).localeCompare(fullName(uById(b))));

    let gHtml='';
    if(sgrp.length){
      gHtml=`<div style="margin-bottom:18px;margin-top:8px">
        <div style="font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Group checklists — any one can complete</div>
        <div style="display:flex;flex-direction:column;gap:8px">
          ${sgrp.map(c=>{
            const sub=DB.submissions.find(x=>x.checklistId===c.id&&x.date===d&&x.status!=='Editing')||null;
            const names=(c.assignees||[]).map(a=>uById(a)).filter(Boolean).map(u=>fullName(u));
            const meta=' · '+((c.assignees||[]).length)+' assignee'+((c.assignees||[]).length!==1?'s':'')+(names.length?' ('+esc(names.slice(0,3).join(', '))+(names.length>3?' +'+(names.length-3):'')+')':'');
            return roCard(c,sub,secKey+'|grp|'+c.id,meta);
          }).join('')}
        </div>
      </div>`;
    }

    let uHtml='';
    if(sUserIds.length){
      uHtml=`<div style="margin-top:${sgrp.length?'0':'8px'}">
        <div style="font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px">Individual checklists — user by user</div>
        <div style="display:flex;flex-direction:column;gap:8px">
        ${sUserIds.map(uid2=>{
          const u=uById(uid2);
          const uKey=secKey+'|'+uid2;
          const ucls=sUserMap[uid2].slice().sort((a,b)=>(a.scheduleTime||'99:99').localeCompare(b.scheduleTime||'99:99')||(a.name||'').localeCompare(b.name||''));
          const done=ucls.filter(c=>subFor(c.id,uid2,d)).length;
          const uExp=S.filters.aclU===uKey;
          const allDone=done===ucls.length;
          const flaggedN=ucls.filter(c=>{const s=subForCl(c,uid2,d);return s&&_subEscalationCount(c,s)>0;}).length;
          return`<div style="background:#fff;border-radius:16px;border:1.5px solid ${uExp?'#C7D2FE':'#ECEDF0'};overflow:hidden">
            <button onclick="S.filters.aclU=S.filters.aclU==='${uKey}'?null:'${uKey}';S.filters.aclExp=null;rr()" style="width:100%;text-align:left;padding:12px 14px;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;gap:10px">
              <span style="color:#C8C5BD;transform:rotate(${uExp?90:0}deg);transition:transform .2s">${ic('chevR','w-4 h-4')}</span>
              ${avatar(u,'w-9 h-9','text-xs')}
              <div style="flex:1;min-width:0">
                <div style="font-size:14px;font-weight:700">${esc(fullName(u))}</div>
                <div style="font-size:12px;color:#9CA3AF">${esc(u.position||u.department||'')}${(()=>{const mg=u.managerId?uById(u.managerId):null;return mg?' · under '+esc(fullName(mg)):'';})()}</div>
              </div>
              ${flaggedN?`<span title="${flaggedN} non-compliant submission${flaggedN>1?'s':''}" style="font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:#FFF1F2;color:#BE123C;margin-right:6px">⚠ ${flaggedN}</span>`:''}
              <span style="font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;background:${allDone?'#E8FAF3':'#FEF7E6'};color:${allDone?'#0D7A4E':'#B36A00'}">${done}/${ucls.length} done</span>
            </button>
            ${uExp?`<div style="padding:0 14px 12px 38px;display:flex;flex-direction:column;gap:8px;border-top:1px solid #F5F4F0;padding-top:10px">
              ${ucls.map(c=>roCard(c,subFor(c.id,uid2,d)||null,uKey+'|'+c.id,'')).join('')}
            </div>`:''}
          </div>`;
        }).join('')}
        </div>
      </div>`;
    }
    return gHtml+uHtml;
  };

  // ── Segregate checklists by location: one section per location (Dubai, etc.), then a
  //    "No location" bucket. A checklist tagged with multiple locations appears under each. ──
  let locationsHtml='';
  let anyContent=false;
  const locList=loc?DB.locations.filter(l=>l.id===loc):DB.locations.slice();
  const locHeader=(label,count,muted)=>`<div style="display:flex;align-items:center;gap:7px;margin:18px 0 10px">
      <span style="color:${muted?'#9CA3AF':'#6366F1'}">${ic('pin','w-4 h-4')}</span>
      <span style="font-size:15px;font-weight:800;color:${muted?'#6B7280':'#15171C'}">${esc(label)}</span>
      <span style="font-size:11px;font-weight:700;color:#9CA3AF;background:#F3F4F6;padding:2px 9px;border-radius:20px">${count}</span>
    </div>`;
  locList.forEach(l=>{
    const secCls=cls.filter(c=>(c.locationIds||[]).includes(l.id));
    if(!secCls.length)return;
    const secHtml=renderSection(secCls,'loc'+l.id);
    if(!secHtml)return;
    anyContent=true;
    locationsHtml+=locHeader(l.name,secCls.length,false)+secHtml;
  });
  if(!loc){
    const noLocCls=cls.filter(c=>!(c.locationIds||[]).length);
    if(noLocCls.length){
      const secHtml=renderSection(noLocCls,'locnone');
      if(secHtml){
        anyContent=true;
        locationsHtml+=locHeader('No location',noLocCls.length,true)+secHtml;
      }
    }
  }

  return`<div class="fade">
    ${hdr('All Checklists',"Everyone's checklists and responses")}
    <!-- Filters row -->
    <div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
      <select onchange="S.filters.aclDep=this.value;S.filters.aclExp=null;S.filters.aclU=null;rr()" style="background:#fff;border:1.5px solid #E5E7EB;border-radius:9px;padding:6px 10px;font-size:13px;font-weight:600;outline:none;cursor:pointer">
        <option value="">All departments</option>
        ${topDepts().map(x=>`<option value="${esc(x.name)}" ${dep===x.name?'selected':''}>${esc(x.name)}</option>`).join('')}
      </select>
      <select onchange="S.filters.aclLoc=this.value;S.filters.aclExp=null;S.filters.aclU=null;rr()" style="background:#fff;border:1.5px solid #E5E7EB;border-radius:9px;padding:6px 10px;font-size:13px;font-weight:600;outline:none;cursor:pointer">
        <option value="">All locations</option>
        ${DB.locations.map(x=>`<option value="${x.id}" ${loc===x.id?'selected':''}>${esc(x.name)}</option>`).join('')}
      </select>
    </div>
    <!-- Sticky calendar strip (same as Team view) -->
    <div style="position:sticky;top:52px;z-index:10;background:rgba(247,246,242,.95);backdrop-filter:blur(12px);margin:0 -16px;padding:0 16px 10px">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0">
        <span style="font-size:13px;font-weight:600;color:#B8B5AC">${d===today?'Today · ':''}${fmtD(d)}</span>
        <div style="display:flex;gap:4px;align-items:center">
          <button onclick="S.filters.aclWk--;S.filters.aclExp=null;rr()" style="width:28px;height:28px;border-radius:8px;border:1.5px solid #ECEDF0;background:#fff;cursor:pointer;display:grid;place-items:center;color:#6B7280">${ic('back','w-3.5 h-3.5')}</button>
          <button onclick="S.filters.aclWk=0;S.filters.aclDate='${today}';S.filters.aclExp=null;rr()" style="padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;border:none;background:${S.filters.aclWk===0&&d===today?'#15171C':'#F6F7F8'};color:${S.filters.aclWk===0&&d===today?'#fff':'#6B7280'}">Today</button>
          <button onclick="S.filters.aclWk++;S.filters.aclExp=null;rr()" style="width:28px;height:28px;border-radius:8px;border:1.5px solid #ECEDF0;background:#fff;cursor:pointer;display:grid;place-items:center;color:#6B7280">${ic('chevR','w-3.5 h-3.5')}</button>
        </div>
      </div>
      <div class="cal4" style="display:flex;flex-direction:row;flex-wrap:nowrap;width:100%">
        ${week.map(dd=>{
          const dn=DAYS3[new Date(dd+'T00:00:00').getDay()];const num=new Date(dd+'T00:00:00').getDate();
          const isT=dd===today;const isSel=dd===d;
          const dots=dayDots(dd);
          return`<button onclick="S.filters.aclDate='${dd}';S.filters.aclExp=null;rr();App._lazyLoadDate('allcl')" class="cal4-d ${isSel?'sel':''}" style="flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;cursor:pointer;border:none;background:${isSel?'#15171C':'transparent'};gap:2px">
            <span style="font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:${isSel?'rgba(255,255,255,.4)':'#B8B5AC'}">${dn.slice(0,3)}</span>
            <span style="width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:${isSel?'#fff':isT?'#fff':'#15171C'};background:${isT&&!isSel?'#15171C':'transparent'}">${num}</span>
            <div style="display:flex;gap:2px;height:6px">
              ${dots.sub?`<span style="width:5px;height:5px;border-radius:50%;background:${isSel?'rgba(255,255,255,.8)':'#10B981'}"></span>`:''}
              ${dots.late?`<span style="width:5px;height:5px;border-radius:50%;background:${isSel?'rgba(255,180,180,.9)':'#F43F5E'}"></span>`:dots.pend?`<span style="width:5px;height:5px;border-radius:50%;background:${isSel?'rgba(255,220,120,.9)':'#F59E0B'}"></span>`:''}
            </div>
          </button>`;
        }).join('')}
      </div>
    </div>
    ${locationsHtml}
    ${!anyContent?`<div style="padding:60px 20px;text-align:center;background:#fff;border-radius:18px;border:1px solid #EEECE8;margin-top:8px">
      <div style="font-size:40px;margin-bottom:10px">\ud83d\udcc5</div>
      <div class="fd" style="font-size:17px;font-weight:800;color:#111110">${!isAdmin()&&!isSubAdmin()&&scopeUsers.length<=1?'No users under you':'No checklists'}</div>
      <p style="font-size:13px;color:#B8B5AC;margin-top:6px">${!isAdmin()&&!isSubAdmin()&&scopeUsers.length<=1
        ?'This tab shows checklists for users in your reporting tree, but nobody reports to this account. Ask a Super Admin to set "Reports to" on your team members — or give the Admin role to the manager they already report to.'
        :`No checklists scheduled for this date${dep||loc?' with the selected filters':''}`}</p>
    </div>`:''}
  </div>`;
}

App._bigImg=(src)=>{openModal(`<div style="padding:10px;position:relative"><button onclick="App.closeModal()" style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);border:none;border-radius:50%;width:26px;height:26px;color:#fff;cursor:pointer;display:grid;place-items:center;z-index:1;font-size:14px">×</button><img src="${esc(src)}" alt="Enlarged photo" style="width:100%;border-radius:10px;max-height:80vh;object-fit:contain;display:block"/></div>`,'max-w-xl');};


function approvalsPage(){
  // Approval list scoped to this user's visibility
  let list=isAdmin()?DB.approvals:DB.approvals.filter(a=>subTree(S.uid).some(u=>u.id===a.requesterId)||a.requesterId===S.uid);
  const tab=S.filters.atab||'Pending';

  const cnt={
    Pending:list.filter(a=>a.status==='Pending').length,
    Approved:list.filter(a=>a.status==='Approved'||a.status==='Used').length,
    Rejected:list.filter(a=>a.status==='Rejected').length,
  };
  const filtered=tab==='Approved'?list.filter(a=>a.status==='Approved'||a.status==='Used'):list.filter(a=>a.status===tab);
  const TABS=['Pending','Approved','Rejected'];
  const TAB_CLR={};

  return '<div class="fade">'+hdr('Approvals','')
    +'<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">'
    +TABS.map(t=>{
      const active=tab===t;
      const badge=cnt[t]?(' <span style="font-size:11px;font-weight:700;padding:1px 6px;border-radius:10px;background:'+(active?'rgba(255,255,255,0.2)':'#F3F4F6')+';color:'+(active?'#fff':TAB_CLR[t]||'#6B7280')+'">'+cnt[t]+'</span>'):'';
      return '<button onclick="App._setTab(this.dataset.t)" data-t="'+t+'" style="padding:8px 16px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;transition:all .15s;background:'+(active?'#15171C':'transparent')+';color:'+(active?'#fff':TAB_CLR[t]||'#6B7280')+'">'+t+badge+'</button>';
    }).join('')
    +'</div>'
    +'<div class="space-y-3">'
    // ── Approvals tabs ──
    +( tab!=='Feedback'
      ? (filtered.length
        ? filtered.map(a=>{

App._decide=async(id,status)=>{
  // Guard: cannot approve your own submission
  const _appr=DB.approvals.find(x=>x.id===id);
  if(_appr&&_appr.requesterId===S.uid&&status==='Approved'){toast('Cannot approve your own submission','err');return;}
  const a=DB.approvals.find(x=>x.id===id);if(!a)return;
  if(a.status!=='Pending'){toast('Already '+a.status.toLowerCase(),'warn');return;}
  // Immediately disable buttons to prevent double-click
  document.querySelectorAll(`[data-id="${id}"]`).forEach(b=>{b.disabled=true;b.style.opacity='0.5';});
  a.status=status;
  const u=uById(a.requesterId),c=clById(a.checklistId);
  const s=DB.submissions.find(x=>x.checklistId===a.checklistId&&x.userId===a.requesterId&&x.date===a.date);
  if(s&&a.type==='Submission'){
    if(status==='Approved'){
      s.status=s.status==='Late'?'Late':'On Time';
    } else {
      s.status='Rejected';
    }
  }
  if(s&&a.type==='Edit Request'){
    s.editRequestStatus=status;
    if(status==='Rejected')s.editRequestStatus='Rejected';
  }
  const msg=a.type==='Edit Request'
    ?(status==='Approved'?'✅ Edit approved for "'+c?.name+'" — you can now resubmit':'❌ Edit request rejected for "'+c?.name+'"')
    :(status==='Approved'
      ?'✅ Submission approved — '+c?.name+' on '+fmtD(a.date)
      :'❌ Submission rejected — '+c?.name+'. '+(a.date?fmtD(a.date):''));
  DB.notifications.unshift({id:uid('n'),userId:a.requesterId,text:msg,time:new Date().toISOString(),read:false});
  if(a.type==='Submission'){
    queueEmail(status==='Approved'?'submission_approved':'submission_rejected', a.requesterId, null, null, {checklist_name:c?.name||''});
  } else if(a.type==='Edit Request'){
    queueEmail('approval_decided', a.requesterId, null, null, {checklist_name:c?.name||''});
  }
  log(fullName(me()),status+' '+a.type,fullName(u));
  _invalidateNotifCache();
  saveDB();
  toast(status==='Approved'?'Approved ✓':'Rejected',status==='Approved'?'ok':'warn');
  _touchAction();render();
  // Targeted Supabase save — only affected rows, not full 11-table sync
  Promise.allSettled([
    sb.from('approvals').update({status:a.status}).eq('id',a.id),
    // Approving/rejecting changes ONLY the status — never rewrite question_responses here, or an
    // approver whose cache is stale would clobber the submitter's uploaded photo URLs with '[photo]'.
    s ? sb.from('submissions').update({status:s.status}).eq('id',s.id) : Promise.resolve(),
    sb.from('notifications').upsert(DB.notifications.slice(0,20).map(n=>({id:n.id,user_id:n.userId,text:n.text,read:n.read||false,created_at:n.time||new Date().toISOString()})),{onConflict:'id'}),
  ]).catch(()=>{});
};

// ── Session keepalive: refresh the auth token every 10 minutes to prevent 401 ──
// NOTE: this no longer re-downloads all data on a timer (that was the main egress drain).
// Data now loads per-tab on click (see _lazyForRoute) and on tab refocus (visibilitychange).
setInterval(async()=>{
  if(!S.uid)return;
  if(document.visibilityState==='hidden')return; // paused while tab is backgrounded
  try{
    const{data:{session},error}=await sb.auth.getSession();
    if(error||!session){
      // Session gone — try refresh
      const{data,error:re}=await sb.auth.refreshSession();
      if(re){console.warn('[auth] session expired, reloading');render();return;}
    }
  }catch(e){console.warn('[keepalive]',e.message);}
},10*60*1000); // every 10 minutes

// ── Refresh the active tab's data when the user returns to a backgrounded tab ──
// While hidden, nothing downloads; on return we refresh only the current route once.
document.addEventListener('visibilitychange',()=>{

// ── Questions CSV import ──
App._importQCSV=(input)=>{
  if(!can('questions','import')){toast('You don’t have permission to import questions','err');return;}
  const file=input.files?.[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.split('\n').map(l=>l.trim()).filter(Boolean);
    if(!lines.length){toast('Empty file','err');return;}
    // Skip header row
    const start=lines[0].toLowerCase().startsWith('text')?1:0;
    const rows=lines.slice(start);
    if(!rows.length){toast('No data rows found','err');return;}
    let added=0,skipped=0;
    rows.forEach(line=>{
      // Parse CSV properly (handle quoted commas)
      const cols=[];let cur='',inQ=false;
      for(let i=0;i<line.length;i++){
        if(line[i]==='"'){inQ=!inQ;}
        else if(line[i]===','&&!inQ){cols.push(cur.trim());cur='';}
        else cur+=line[i];
      }
      cols.push(cur.trim());
      const [text,type,o1,o2,o3,o4,o5,condition,cval,cval2,photo,comment,approval]=cols;
      if(!text||!type){skipped++;return;}
      const qtRaw=(type||'').toLowerCase().trim();
      const qtype=['passfail','yesno','tick','number','answer'].includes(qtRaw)?qtRaw:'answer';
      // Build options
      let options=[];
      if(qtype==='passfail'){
        options=[{text:'Pass',escalate:false},{text:'Fail',escalate:false}];
      } else if(qtype==='yesno'){
        options=[{text:'Yes',escalate:false},{text:'No',escalate:false}];
      } else if(qtype==='tick'){
        options=[{text:'Done',escalate:false},{text:'Not done',escalate:false}];
      } else if(qtype==='answer'){
        options=[o1,o2,o3,o4,o5].filter(Boolean).map(t=>({text:t.trim(),escalate:false}));
        if(!options.length){skipped++;return;}
      } else if(qtype==='number'){
        // Parse condition if provided
        const validConds=['lt','lte','gt','gte','eq','neq','between'];
        const cond=(condition||'').toLowerCase().trim();
        if(cond&&validConds.includes(cond)){
          const condObj={condition:cond,value:parseFloat(cval)||0};
          if(cond==='between')condObj.value2=parseFloat(cval2)||condObj.value;
          options=[condObj];
        }
        // number questions can have 0 conditions (manual entry) so don't skip
      }
      const isTrue=s=>(s||'').toLowerCase().trim()==='true'||s==='1';
      const q={
        id:uid('q'),
        text:text.trim(),
        type:qtype,
        options,
        photo:isTrue(photo),
        comment:isTrue(comment),
        approval:isTrue(approval),
        isPublic:false,
        createdBy:S.uid,
        createdAt:new Date().toISOString()
      };
      if(!DB.questions)DB.questions=[];
      DB.questions.push(q);
      added++;
    });
    if(added){
      saveDB();
      sb.from('questions').upsert(DB.questions.filter(q=>q.createdBy===S.uid).map(q=>({id:q.id,text:q.text||'',type:q.type||'answer',options:q.options||[],photo:q.photo||false,approval:q.approval||false,comment:q.comment||false,is_public:q.isPublic!==false,created_by:q.createdBy||null,created_at:q.createdAt||new Date().toISOString(),department_id:q.departmentId||null,sub_department_id:q.subDepartmentId||null})),{onConflict:'id'}).then(()=>{}).catch(()=>{});
      rr();
      toast(added+' question'+(added===1?'':'s')+' imported'+(skipped?' ('+skipped+' skipped)':'')+'  ✓','ok');
    } else {
      toast('No valid questions found'+(skipped?' — '+skipped+' rows skipped':''),'err');
    }
    input.value=''; // Reset so same file can be uploaded again
  };
  reader.readAsText(file);
};

function _qGroupHTML(list){
  if(!list.length)return empty('help','No questions yet','Create questions or upload a CSV template.');
  const C=S.filters.qColl=S.filters.qColl||{};
  const tops=topDepts();
  const used=new Set();
  let html='';
  const chev=(open)=>`<span style="display:inline-grid;place-items:center;width:20px;height:20px;border-radius:6px;background:#F3F4F6;color:#6B7280;font-size:9px;flex-shrink:0;transform:rotate(${open?90:0}deg);transition:transform .15s">▶</span>`;
  const deptHdr=(key,name,count,open)=>`<button onclick="App._qTogGroup('${key}')" style="width:100%;display:flex;align-items:center;gap:8px;margin:18px 0 8px;background:transparent;border:none;cursor:pointer;text-align:left;padding:0">${chev(open)}<div style="width:30px;height:30px;border-radius:9px;background:#ECFDF5;display:grid;place-items:center;flex-shrink:0">${ic('dept','w-4 h-4')}</div><div style="font-size:14px;font-weight:800;color:#111827">${esc(name)}</div><span style="font-size:11px;font-weight:800;padding:1px 8px;border-radius:10px;background:#F3F4F6;color:#6B7280">${count}</span></button>`;
  const subHdr=(key,name,count,open)=>`<button onclick="App._qTogGroup('${key}')" style="display:flex;align-items:center;gap:7px;margin:10px 0 6px 8px;background:transparent;border:none;cursor:pointer;padding:0">${chev(open)}<span style="width:6px;height:6px;border-radius:50%;background:#0E9F6E"></span><div style="font-size:12px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.04em">${esc(name)}</div><span style="font-size:10.5px;font-weight:800;color:#9CA3AF">${count}</span></button>`;
  tops.forEach(dep=>{
    const direct=list.filter(q=>q.departmentId===dep.id&&!q.subDepartmentId);
    const subBlocks=subDepts(dep.id).map(sd=>({sd,qs:list.filter(q=>q.subDepartmentId===sd.id)}));
    const total=direct.length+subBlocks.reduce((a,b)=>a+b.qs.length,0);
    direct.forEach(q=>used.add(q.id));subBlocks.forEach(({qs})=>qs.forEach(q=>used.add(q.id)));
    if(!total)return;
    const dKey='d:'+dep.id,dOpen=!C[dKey];
    html+=deptHdr(dKey,dep.name,total,dOpen);
    if(dOpen){
      if(direct.length){const k='s:'+dep.id+':general',sOpen=!C[k];html+=subHdr(k,'General',direct.length,sOpen);if(sOpen)html+='<div class="space-y-2">'+direct.map(q=>qCard(q)).join('')+'</div>';}
      subBlocks.forEach(({sd,qs})=>{if(!qs.length)return;const k='s:'+sd.id,sOpen=!C[k];html+=subHdr(k,sd.name,qs.length,sOpen);if(sOpen)html+='<div class="space-y-2">'+qs.map(q=>qCard(q)).join('')+'</div>';});
    }
  });
  const rest=list.filter(q=>!used.has(q.id));
  if(rest.length){const k='d:rest',rOpen=!C[k];html+=deptHdr(k,'Unassigned',rest.length,rOpen);if(rOpen)html+='<div class="space-y-2">'+rest.map(q=>qCard(q)).join('')+'</div>';}
  return html;
}

App._filterQuestions=(val)=>{
  S.filters.qSearch=val;
  const box=document.getElementById('qResults');
  if(!box)return;
  let allQ=visibleQuestions();
  const _qd=S.filters.qDept||'',_qsd=S.filters.qSubDept||'';

  if(_qsd)allQ=allQ.filter(q=>q.subDepartmentId===_qsd);

App._delQuestion=(id)=>{
  const q=(DB.questions||[]).find(x=>x.id===id);if(!q)return;
  if(!canManageQ(q)&&!can('questions','delete')){toast('You don’t have permission to delete this question','err');return;}
  // ── Guard: a question that is still used in ANY checklist must not be deleted. Deleting a
  //    question that was assigned to someone is exactly what caused the "Mohit 15 / Wendy 16"
  //    count mismatch. The question must first be removed from those checklists. ──
  const _usedIn=(DB.checklists||[]).filter(c=>(c.questionIds||[]).includes(id));
  if(_usedIn.length){
    const _assignees=new Set();_usedIn.forEach(c=>(c.assignees||[]).forEach(a=>_assignees.add(a)));
    const _names=_usedIn.slice(0,4).map(c=>'• '+(c.name||'Untitled')).join('\n')+(_usedIn.length>4?'\n• +'+(_usedIn.length-4)+' more':'');
    alert("Can't delete this question — it's still used in "+_usedIn.length+' checklist'+(_usedIn.length>1?'s':'')+':\n'+_names+(_assignees.size?'\n\nThose checklists are assigned to '+_assignees.size+' user'+(_assignees.size>1?'s':''):'')+".\n\nOpen each checklist and remove this question first, then you can delete it.");
    return;
  }
  if(!confirm('Delete "'+q.text+'"?'))return;
  if(!DB.questions_deleted)DB.questions_deleted=[];
  if(!DB.questions_deleted.includes(id))DB.questions_deleted.push(id);
  DB.questions=(DB.questions||[]).filter(x=>x.id!==id);
  DB.checklists.forEach(c=>{c.questionIds=(c.questionIds||[]).filter(x=>x!==id);if(c.questionConfigs)delete c.questionConfigs[id];});
  toast('Deleted','warn');saveDB();render();
  // Sync to Supabase in background
  sb.from('questions').delete().eq('id',id).then(({error})=>{
    if(error)console.error('delQuestion sync:',error.message);
  }).catch(e=>console.error('delQuestion:',e));
};

App._editQuestion=(id)=>{

    id:uid('q'),text:'',type:'answer',options:[],photo:false,approval:false,comment:false,isPublic:false,departmentId:null,subDepartmentId:null

};

App._saveQuestion=()=>{
  if(!_QED)return;
  if(!can('questions','create')&&!can('questions','edit')&&!can('questions','manage')){toast('You don’t have permission to do that','err');return;}
  const textEl=document.getElementById('qed-text');
  if(textEl)_QED.text=textEl.value.trim();
  const text=(_QED.text||'').trim();
  if(!text){toast('Question text is required','err');const qb=document.getElementById('q-save-btn');if(qb){qb.disabled=false;qb.textContent=_QED?.createdAt?'Save changes':'Create question';}return;}
  if(_QED.type==='answer'){
    _QED.options=(_QED.options||[]).filter(o=>(o.text||'').trim());
    if(!_QED.options.length){toast('Add at least one answer option','err');const qb=document.getElementById('q-save-btn');if(qb){qb.disabled=false;qb.textContent=_QED?.createdAt?'Save changes':'Create question';}return;}
  }
  if(_QED.type==='number'&&!(_QED.options||[]).length){toast('Add at least one condition','err');const qb=document.getElementById('q-save-btn');if(qb){qb.disabled=false;qb.textContent=_QED?.createdAt?'Save changes':'Create question';}return;}
  if(!DB.questions)DB.questions=[];
  const existIdx=DB.questions.findIndex(x=>x.id===_QED.id);
  const isNew=existIdx===-1;
  if(!isNew){DB.questions[existIdx]=_QED;}
  else{_QED.createdBy=S.uid;_QED.createdAt=new Date().toISOString();DB.questions.push(_QED);}
  // ── Save locally and close IMMEDIATELY ──
  toast(isNew?'Question created ✓':'Saved ✓');
  closeModal();
  const savedQ=_QED;_QED=null;
  saveDB();
  render();
  // ── Sync to Supabase in background ──
  const qRow={id:savedQ.id,text:savedQ.text||'',type:savedQ.type||'answer',options:savedQ.options||[],photo:savedQ.photo||false,approval:savedQ.approval||false,comment:savedQ.comment||false,is_public:savedQ.isPublic!==false,created_by:savedQ.createdBy||null,created_at:savedQ.createdAt||new Date().toISOString(),department_id:savedQ.departmentId||null,sub_department_id:savedQ.subDepartmentId||null};
  sb.from('questions').upsert(qRow,{onConflict:'id'}).then(({error})=>{
    if(error){console.error('Question sync error:',error.message);toast('⚠ Question saved locally but not synced: '+error.message.slice(0,60),'warn');}
    // Department & sub-department are protected by a DB freeze-trigger so stale browser tabs can't
    // wipe them. A plain upsert can no longer change them — apply this deliberate assignment
    // through the sanctioned RPC (works for both a new and an existing question).
    sb.rpc('set_question_department',{p_id:savedQ.id,p_dept:savedQ.departmentId||null,p_subdept:savedQ.subDepartmentId||null}).then(({error})=>{if(error)console.warn('set_question_department:',error.message);}).catch(e=>console.warn('set dept:',e&&e.message));
  }).catch(e=>console.error('Question sync:',e));
};

// Read all checklist modal form values into CLD (prevents data loss on re-render)
function _snapshotCLD(){
  if(!CLD)return;
  // Only read fields that actually exist in DOM right now
  const el=id=>document.getElementById(id);
  if(el('cn-name'))CLD.name=el('cn-name').value.trim()||CLD.name;
  if(el('cn-desc'))CLD.description=el('cn-desc').value.trim();
  if(el('cn-status')&&el('cn-status').value)CLD.status=el('cn-status').value;
  if(el('cn-dep')&&el('cn-dep').value)CLD.department=el('cn-dep').value;
  if(el('cn-subdep'))CLD.subDepartment=el('cn-subdep').value;
  if(el('cn-freq')&&el('cn-freq').value)CLD.frequency=el('cn-freq').value;
  if(el('cn-sd'))CLD.startDate=el('cn-sd').value||null;
  if(el('cn-ed'))CLD.endDate=el('cn-ed').value||null;
  if(el('cn-time'))CLD.scheduleTime=el('cn-time').value||null;
  if(el('cn-anyone'))CLD.anyOne=el('cn-anyone').classList.contains('on');
}


App._confirmClQs=()=>{
  if(!CLD||!App._clQSel)return;
  // Snapshot all current form values before re-rendering (prevents data loss)
  _snapshotCLD();
  // Preserve existing order, then add new ones at end
  const existing=CLD.questionIds||[];
  const newIds=[...App._clQSel];
  // Keep existing order for already-selected, add new ones at end
  CLD.questionIds=[...existing.filter(id=>newIds.includes(id)),...newIds.filter(id=>!existing.includes(id))];
  CLD.questionConfigs=CLD.questionConfigs||{};
  // Remove configs for deselected questions
  Object.keys(CLD.questionConfigs).forEach(qid=>{
    if(!App._clQSel.has(qid))delete CLD.questionConfigs[qid];
  });
  closeModal();
  _renderClModal(!!(DB.checklists.find(c=>c.id===CLD.id)));
};

// ── Compliance check (Fix #3, revised) ──
// Returns the Set of question IDs that actually triggered a REAL escalation ticket for a
// given submission — matched by checklist + date + the submission's own submitter (so
// "any one" group submissions match whoever submitted). This is the single source of
// truth for both the card badge (count) and the per-question red highlight.
// Does a single stored answer (resp) trip an escalation for question q on checklist c?
// Pure re-evaluation of the saved response against the checklist's escalation config —
// this is what makes OLD submissions show compliance even when no ticket was ever created.
function _qrEscalates(c,q,resp){
  if(!c||!q||!resp)return false;
  const r=resp.response;
  if(r===null||r===undefined||r==='')return false; // unanswered ≠ escalation
  const qCfg=(c.questionConfigs||{})[q.id]||{};
  if(q.type==='answer'){
    const _respStr=String(r).trim();
    const optIdx=(q.options||[]).findIndex(o=>String(o.text||'').trim()===_respStr);
    return optIdx>-1&&!!qCfg['opt_'+optIdx];
  }
  if(q.type==='number'){
    const val=parseFloat(r);
    for(let i=0;i<(q.options||[]).length;i++){
      const cond=q.options[i];let m=false;
      if(cond.condition==='lt')m=val<cond.value;
      else if(cond.condition==='lte')m=val<=cond.value;
      else if(cond.condition==='gt')m=val>cond.value;
      else if(cond.condition==='gte')m=val>=cond.value;
      else if(cond.condition==='eq')m=val===cond.value;
      else if(cond.condition==='neq')m=val!==cond.value;
      else if(cond.condition==='between')m=val>=cond.value&&val<=(cond.value2||cond.value);
      if(m)return !!qCfg['opt_'+i];
    }
    return false;
  }
  // passfail / yesno / tick — match by label index
  const labels={passfail:['Pass','Fail'],yesno:['Yes','No'],tick:['Done','Not done']};
  const lbs=labels[q.type]||[];
  const optIdx=lbs.findIndex(l=>l.toLowerCase()===String(r).trim().toLowerCase());
  return optIdx>-1&&!!qCfg['opt_'+optIdx];
}
function _subEscalatedQids(c,sub){
  const out=new Set();
  if(!c||!sub)return out;
  // 1) Re-evaluate the actual saved answers against the escalation config (works on old data)
  const qById={};(c.questionIds||[]).forEach(qid=>{const q=(DB.questions||[]).find(x=>x.id===qid);if(q)qById[qid]=q;});
  (sub.questionResponses||[]).forEach(resp=>{
    const q=qById[resp.questionId];
    if(q&&_qrEscalates(c,q,resp))out.add(resp.questionId);
  });
  // 2) Union with any real escalation tickets recorded for this submission (belt and suspenders)
  const submitterId=sub.userId; // for "any one" group checklists this is whoever submitted
  (DB.tickets||[]).forEach(t=>{
    if(t.checklistId===c.id&&t.date===sub.date&&t.submitterId===submitterId&&t.questionId){
      out.add(t.questionId);
    }
  });
  return out;
}
// Count of distinct questions that escalated (0 = compliant).
function _subEscalationCount(c,sub){return _subEscalatedQids(c,sub).size;}
// ── Separate badges: Attempt (answered/total) + Compliance (escalations) ──
// Returns an HTML string with up to two pills. `opts.small` shrinks them for dense rows.
function _subBadges(c,sub,opts){
  if(!sub)return'';
  const total=(c.questionIds||[]).length;
  const answered=(sub.questionResponses||[]).filter(r=>r.response!==null&&r.response!==undefined&&r.response!=='').length;
  const flagged=_subEscalationCount(c,sub);
  const small=opts&&opts.small;
  const pad=small?'2px 7px':'3px 9px';
  const fs=small?'10px':'11px';
  const allAns=total>0&&answered>=total;
  // Attempt badge — green when all questions attempted, grey otherwise
  const attBg=allAns?'#ECFDF5':'#F6F7F8';
  const attClr=allAns?'#059669':'#6B7280';
  const attLabel=small?answered+'/'+total:answered+'/'+total+' attempted';
  const attempt=total>0
    ? '<span title="'+answered+' of '+total+' question'+(total>1?'s':'')+' attempted" style="font-size:'+fs+';font-weight:700;padding:'+pad+';border-radius:20px;background:'+attBg+';color:'+attClr+'">'+(allAns?'✓ ':'')+attLabel+'</span>'
    : '';
  // Compliance badge — green "Compliant" when no escalations, red "N escalated" when flagged
  const compBg=flagged?'#FFF1F2':'#ECFDF5';
  const compClr=flagged?'#BE123C':'#059669';
  const compLabel=flagged
    ? (small?'⚠ '+flagged:'⚠ '+flagged+' escalated')
    : (small?'✓':'✓ Compliant');
  const compliance='<span title="'+(flagged?flagged+' answer'+(flagged>1?'s':'')+' triggered an escalation':'No escalations — compliant')+'" style="font-size:'+fs+';font-weight:700;padding:'+pad+';border-radius:20px;background:'+compBg+';color:'+compClr+'">'+compLabel+'</span>';
  return attempt+compliance;
}
// Back-compat boolean wrapper (kept in case anything references the old name)
function _subHasEscalation(c,subOrResponses){
  if(subOrResponses&&!Array.isArray(subOrResponses))return _subEscalationCount(c,subOrResponses)>0;
  return false;
}

// ── Escalation on submit ──
function _processEscalations(checklistId,date,responses){
  const c=clById(checklistId);if(!c)return;
  const u=me();
  const configs=c.questionConfigs||{};
  (responses||[]).forEach(resp=>{
    const q=(DB.questions||[]).find(x=>x.id===resp.questionId);if(!q)return;
    const qCfg=configs[resp.questionId]||{};
    let escalateTo=null;
    // Find which option index matched the response
    if(q.type==='answer'){
      const _respStr=String(resp.response||'').trim();const optIdx=(q.options||[]).findIndex(o=>String(o.text||'').trim()===_respStr);
      if(optIdx>-1)escalateTo=qCfg['opt_'+optIdx]||null;
    } else if(q.type==='number'){
      const val=parseFloat(resp.response);
      for(let i=0;i<(q.options||[]).length;i++){
        const cond=q.options[i];
        let m=false;
        if(cond.condition==='lt')m=val<cond.value;
        else if(cond.condition==='lte')m=val<=cond.value;
        else if(cond.condition==='gt')m=val>cond.value;
        else if(cond.condition==='gte')m=val>=cond.value;
        else if(cond.condition==='eq')m=val===cond.value;
        else if(cond.condition==='neq')m=val!==cond.value;
        else if(cond.condition==='between')m=val>=cond.value&&val<=(cond.value2||cond.value);
        if(m){escalateTo=qCfg['opt_'+i]||null;break;}
      }
    } else {
      // passfail, yesno, tick — match by label index
      const labels={passfail:['Pass','Fail'],yesno:['Yes','No'],tick:['Done','Not done']};
      const lbs=labels[q.type]||[];
      const optIdx=lbs.findIndex(l=>l.toLowerCase()===String(resp.response||'').trim().toLowerCase());
      if(optIdx>-1)escalateTo=qCfg['opt_'+optIdx]||null;
    }
    if(escalateTo){
      if(!DB.notifications)DB.notifications=[];
      if(!DB.tickets)DB.tickets=[];
      const escMsg='⚠️ Escalation: "'+q.text+'" answered "'+String(resp.response||'')+'" by '+fullName(u)+' on '+c.name+' ('+date+')';
      // Determine priority from question or response
      const _respLower=String(resp.response||'').toLowerCase();
      const ticketPriority=_respLower==='fail'||_respLower==='not done'||_respLower==='no'?'High':'Medium';
      // ── Deduplication: don't create ticket if one already exists for same question+checklist
      // that is still Open or In Progress (unresolved)
      const existingOpenTicket=(DB.tickets||[]).find(t=>
        t.questionId===q.id&&
        t.checklistId===checklistId&&
        t.submitterId===S.uid&&
        (t.status==='Open'||t.status==='In Progress')
      );
      if(existingOpenTicket){
        // Just update the notification so assignee knows it happened again
        DB.notifications.unshift({id:uid('n'),userId:escalateTo,text:'🔁 Repeat escalation: "'+q.text+'" answered "'+String(resp.response||'')+'" again by '+fullName(u)+' — ticket #'+existingOpenTicket.id.slice(-6)+' still open',time:new Date().toISOString(),read:false,type:'escalation',kind:'escalation'});
        _invalidateNotifCache();
        return; // Skip creating a duplicate ticket
      }
      // Create ticket
      const ticket={
        id:uid('tk'),
        title:q.text.slice(0,80),
        description:'Answer: "'+String(resp.response||'')+'"\nSubmitted by: '+fullName(u)+'\nChecklist: '+c.name+'\nDate: '+date,
        priority:ticketPriority,
        status:'Open',
        assignedTo:escalateTo,
        createdBy:S.uid,
        checklistId:checklistId,
        questionId:q.id,
        questionText:q.text,
        answerGiven:String(resp.response||''),
        submitterId:S.uid,
        date:date,
        createdAt:new Date().toISOString(),
        resolvedAt:null,
        resolveNote:'',
        viewedBy:[]
      };
      DB.tickets.unshift(ticket);
      // Insert ticket directly to Supabase — don't rely on debounced _sync
      sb.from('tickets').insert({
        id:ticket.id,
        title:ticket.title,
        description:ticket.description,
        priority:ticket.priority,
        status:ticket.status,
        assigned_to:ticket.assignedTo,
        created_by:ticket.createdBy,
        checklist_id:ticket.checklistId,
        question_id:ticket.questionId,
        question_text:ticket.questionText,
        answer_given:ticket.answerGiven,
        submitter_id:ticket.submitterId,
        date:ticket.date,
        created_at:ticket.createdAt,
        resolved_at:null,
        resolve_note:'',
        viewed_by:[]
      }).then(({error})=>{
        if(error)console.error('[ticket insert]',error.message);
        else console.log('[ticket]',ticket.id,'inserted for',ticket.assignedTo);
      }).catch(e=>console.error('[ticket insert failed]',e.message));
      // In-app notification to assignee
      DB.notifications.unshift({id:uid('n'),userId:escalateTo,text:escMsg,time:new Date().toISOString(),read:false,type:'escalation',kind:'escalation'});
      queueEmail('escalation',escalateTo,null,date,{checklist_name:c.name,question:q.text,answer:String(resp.response||''),submitter:fullName(u)});
      // In-app notification to admin
      const adminU=DB.users.find(x=>x.role==='Admin');
      if(adminU&&adminU.id!==escalateTo&&adminU.id!==S.uid){
        DB.notifications.unshift({id:uid('n'),userId:adminU.id,text:escMsg,time:new Date().toISOString(),read:false,type:'escalation',kind:'escalation'});
      }
      // Email the escalation target
      queueEmail('escalation',escalateTo,null,date,{checklist_name:c.name,question:q.text,answer:String(resp.response||''),submitter:fullName(u)});
      _invalidateNotifCache();
    }
  });
}

function notificationsPage(){
  const uid=S.uid;
  const notifs=DB.notifications.filter(n=>n.userId===uid).sort((a,b)=>(b.time||'').localeCompare(a.time||'')).slice(0,80);
  // Track which were unread BEFORE marking them (so the dot shows on this render)
  const unreadIds=new Set(notifs.filter(n=>!n.read).map(n=>n.id));
  const hadUnread=unreadIds.size>0;
  // Mark as read after a short delay so user can see what was unread
  if(hadUnread){
    setTimeout(()=>{
      notifs.forEach(n=>n.read=true);
      _invalidateNotifCache();
      saveDB();
    },1500);
  }
  // Feedback for this user
  const myFb=DB.feedback.filter(fb=>fb.userId===uid).sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  const unackFb=myFb.filter(fb=>!fb.acknowledged);

  const tab=S.filters.ntab||'All';
  const TABS=['All','Approvals','Escalations','Feedback'];

  function notifType(text){
    if(!text)return'general';
    if(text.includes('💬')||text.includes('replied')||text.includes('reply'))return'feedback';
    if(text.includes('Feedback')||text.includes('feedback'))return'feedback';
    
    if(text.includes('Escalation')||text.includes('escalation'))return'escalation';
    if(text.includes('Approved')||text.includes('approved'))return'approval';
    if(text.includes('Rejected')||text.includes('rejected'))return'approval';
    if(text.includes('pproval')||text.includes('pprove'))return'approval';
    if(text.includes('Edit')||text.includes('edit request')||text.includes('resubmit'))return'edit';
    if(text.includes('Re-submitted')||text.includes('Resubmit'))return'edit';
    if(text.includes('overdue')||text.includes('Late')||text.includes('late'))return'late';
    return'general';
  }
  const TYPE_CLR={approval:'#8B5CF6',edit:'#0EA5E9',escalation:'#F97316',feedback:'#3B82F6',late:'#EF4444',general:'#6B7280'};
  const TYPE_BG={approval:'#EDE9FE',edit:'#E0F2FE',escalation:'#FFF7ED',feedback:'#EFF6FF',late:'#FEF2F2',general:'#F6F7F8'};
  const TYPE_ICON={approval:'approve',edit:'edit',escalation:'alert',feedback:'msg',late:'clock',general:'bell'};

  const filteredNotifs=tab==='All'?notifs
    :tab==='Approvals'?notifs.filter(n=>['approval','edit'].includes(notifType(n.text)))
    :tab==='Feedback'?notifs.filter(n=>notifType(n.text)==='feedback')
    :tab==='Escalations'?notifs.filter(n=>notifType(n.text)==='escalation')
    :notifs;

  const counts={
    All:notifs.length,
    Approvals:notifs.filter(n=>['approval','edit'].includes(notifType(n.text))).length,
    Escalations:notifs.filter(n=>notifType(n.text)==='escalation').length,
    Feedback:notifs.filter(n=>notifType(n.text)==='feedback').length+myFb.filter(fb=>!fb.acknowledged).length,

  };

  return '<div class="fade">'+hdr('Notifications','')
    // Tabs
    +'<div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap">'
    +TABS.map(t=>{
      const active=tab===t;
      const badge=counts[t]?(' <span style="font-size:10px;font-weight:800;padding:1px 6px;border-radius:10px;background:'+(active?'rgba(255,255,255,0.25)':'#F3F4F6')+';color:'+(active?'#fff':'#6B7280')+'">'+counts[t]+'</span>'):'';
      return '<button onclick="App._setNTab(this.dataset.t)" data-t="'+t+'" style="padding:8px 16px;border-radius:10px;font-size:14px;font-weight:600;border:none;cursor:pointer;background:'+(active?'#15171C':'transparent')+';color:'+(active?'#fff':'#6B7280')+'">'+t+badge+'</button>';
    }).join('')
    +'</div>'
    // Feedback section (when tab=Feedback)
    +(tab==='Feedback'
      ? _feedbackTabContent(uid)
      // Notification timeline for other tabs
      : (filteredNotifs.length
        ? '<div style="background:#fff;border-radius:16px;border:1px solid #E5E7EB;overflow:hidden">'
          +'<div style="display:flex;flex-direction:column">'
          +filteredNotifs.map((n,idx)=>{
              const type=notifType(n.text);
              const clr=TYPE_CLR[type];const bg=TYPE_BG[type];const ico=TYPE_ICON[type];
              const isNew=unreadIds.has(n.id);
              // Parse deep-link target from notification text
              return '<div style="display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-bottom:1px solid #F9F8F5;cursor:pointer;'+(isNew?'background:#FAFFFE':'background:#fff')+'" onclick="App._notifClick(this.dataset.id)" data-id="'+n.id+'">'
                +'<div style="width:36px;height:36px;border-radius:10px;background:'+bg+';display:grid;place-items:center;flex-shrink:0;margin-top:1px">'+ic(ico,'w-4 h-4 text-['+clr+']')+'</div>'
                +'<div style="flex:1;min-width:0">'
                +'<p style="font-size:13px;color:#111110;margin:0;line-height:1.5;font-weight:'+(isNew?'600':'400')+'">'+esc(n.text)+'</p>'
                +'<p style="font-size:11px;color:#B8B5AC;margin-top:3px">'+(n.time?new Date(n.time).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}):'')+' · '+type.charAt(0).toUpperCase()+type.slice(1)+'</p>'
                +'</div>'
                +(isNew?'<div style="width:7px;height:7px;border-radius:50%;background:#0E9F6E;flex-shrink:0;margin-top:6px"></div>':'')
                +'</div>';
            }).join('')
          +'</div></div>'
        : empty('bell','All clear','No notifications yet.')
      )
    )
    +'</div>';
}
App._setNTab=(t)=>{S.filters.ntab=t;rr();};
App._notifClick=(id)=>{
  const n=DB.notifications.find(x=>x.id===id);if(!n)return;
  n.read=true;_invalidateNotifCache();saveDB();
  const t=n.text||'';
  // Navigate first with clean filters, then set the tab
  if(t.includes('💬')||t.includes('replied')||t.includes('Feedback')){
    App._goNotifFeedback();return;
  }

  if(t.includes('approved')||t.includes('Approved')){
    S.route='approvals';S.search='';S.expandedCl=null;S.afOpen=null;S.tvUser=null;
    S.filters={atab:'Approved'};render();window.scrollTo(0,0);return;
  }
  if(t.includes('rejected')||t.includes('Rejected')){
    S.route='approvals';S.search='';S.expandedCl=null;S.afOpen=null;S.tvUser=null;
    S.filters={atab:'Rejected'};render();window.scrollTo(0,0);return;
  }
  if(t.includes('approval')||t.includes('Pending')){
    S.route='approvals';S.search='';S.expandedCl=null;S.afOpen=null;S.tvUser=null;
    S.filters={atab:'Pending'};render();window.scrollTo(0,0);return;
  }
  if(t.includes('submitted')||t.includes('resubmit')||t.includes('Re-submitted')){
    S.route='approvals';S.search='';S.expandedCl=null;S.afOpen=null;S.tvUser=null;
    S.filters={atab:'Pending'};render();window.scrollTo(0,0);return;
  }
  // Escalation/ticket notification → go to tickets page
  if(t.includes('Escalation')||t.includes('escalation')){
    App.go('tickets');return;
  }
  // Checklist removed → go to my checklists
  if(t.includes('Checklist removed')||t.includes('no longer assigned')){
    App.go('mychecklists');return;
  }
  // Default: go to notifications
  App._setNTab('All');App.go('notifications');
};

App._sfbSelectType=(btn)=>{
  document.querySelectorAll('[data-type]').forEach(b=>{
    const active=b===btn;
    b.style.background=active?'#15171C':'#fff';
    b.style.color=active?'#fff':'#6B7280';
    b.style.borderColor=active?'#15171C':'#E5E7EB';
  });
  const type=btn.dataset.type;
  // Store in hidden input for reliable reading
  const hid=document.getElementById('sfb-type-val');if(hid)hid.value=type;
  // Show/hide checklist+task based on type — use explicit wrapper IDs
  const clWrap=document.getElementById('sfb-cl-wrap');
  const taskWrap=document.getElementById('sfb-task-wrap');
  if(type==='Performance'||type==='General'){
    if(clWrap)clWrap.style.display='none';
    if(taskWrap)taskWrap.style.display='none';
  } else if(type==='Checklist'){
    if(clWrap)clWrap.style.display='';
    if(taskWrap)taskWrap.style.display='none';
  } else {
    if(clWrap)clWrap.style.display='';
  }
};
App._sfbClChange=(clId)=>{
  // Tasks removed — task selector always hidden
  const taskWrap=document.getElementById('sfb-task-wrap');
  if(taskWrap)taskWrap.style.display='none';
};
App._saveSendFeedback=(userId)=>{
  if(!userId){toast('No user selected','err');return;}
  const title=$('#sfb-title')?.value?.trim();
  const text=$('#sfb-text')?.value?.trim();
  if(!text){toast('Write a comment','err');return;}
  const clId=$('#sfb-cl')?.value||null;
  const type=(document.getElementById('sfb-type-val')?.value)||'General';
  const priority=$('#sfb-pri')?.value||'Low';
  if(!DB.feedback)DB.feedback=[];
  DB.feedback.push({
    id:uid('fb'),title:title||type+' Feedback',type,
    checklistId:clId||null,userId,managerId:S.uid,
    date:todayISO(),text,priority,taskName:taskName||null,
    level:'direct',acknowledged:false,status:'Sent',
    createdAt:new Date().toISOString()
  });
  DB.notifications.unshift({id:uid('n'),userId,text:'Feedback from '+fullName(me())+': "'+( title||text.slice(0,40))+'"',time:new Date().toISOString(),read:false});
  _invalidateNotifCache();log(fullName(me()),'Sent feedback',fullName(uById(userId)));
  toast('Feedback sent ✓');closeModal();saveDB();render();
};
/* ===== HIERARCHY ===== */
function hierarchyPage(){
  const admin=isAdmin()||isSubAdmin();
  const roots=admin?DB.users.filter(u=>u.status!=='Inactive'&&(!u.managerId||!uById(u.managerId))):[me()].filter(Boolean);
  return`<div class="fade">${hdr(admin?'Organisation':'My Team','Reporting structure')}
  <div class="ui-card" style="padding:26px 18px;overflow:auto"><div class="oc"><ul>${roots.map(r=>_tNode(r,0)).join('')}</ul></div></div></div>`;
}
function _tNode(u,d){
  if(d>9)return'';
  const kids=DB.users.filter(x=>x.managerId===u.id&&x.id!==u.id&&x.status!=='Inactive');
  const col=COLL[u.id];
  const rp=(typeof _roleOf==='function')?_roleOf(u):null;
  const tag=u.role==='Admin'?['SUPER ADMIN','#15171C','#fff']:u.role==='SubAdmin'?['ADMIN','#EEF2FF','#4338CA']:((rp&&rp.id==='manager')||kids.length)?['MANAGER','#E0F2FE','#0369A1']:null;
  const card=`<div style="display:inline-flex;flex-direction:column;align-items:center;gap:6px;background:var(--c-surface);border:1px solid var(--c-border);border-radius:12px;padding:10px 14px;box-shadow:var(--sh-xs);min-width:118px;max-width:170px;position:relative">
      ${avatar(u,'w-9 h-9','text-[11px]')}
      <div style="min-width:0;text-align:center">
        <div style="font-size:12px;font-weight:700;color:var(--c-text);line-height:1.25">${esc(fullName(u))}</div>
        <div style="font-size:10px;color:var(--c-text-3);margin-top:1px;line-height:1.3">${esc(u.position||u.department||'')}</div>
        ${tag?`<div style="margin-top:4px"><span style="font-size:8.5px;font-weight:800;padding:1px 7px;border-radius:4px;background:${tag[1]};color:${tag[2]};letter-spacing:.03em">${tag[0]}</span></div>`:''}
      </div>
      ${kids.length?`<button onclick="COLL['${u.id}']=!COLL['${u.id}'];rr()" title="${col?'Expand':'Collapse'} ${kids.length} report${kids.length===1?'':'s'}" style="position:absolute;bottom:-11px;left:50%;transform:translateX(-50%);min-width:22px;height:22px;padding:0 6px;display:inline-flex;align-items:center;justify-content:center;gap:2px;border-radius:11px;border:1.5px solid var(--c-border-2);background:var(--c-surface);cursor:pointer;color:var(--c-text-2);font-size:10px;font-weight:800;line-height:1;box-shadow:var(--sh-xs);z-index:1">${col?'+'+kids.length:'–'}</button>`:''}
    </div>`;
  return`<li>${card}${kids.length&&!col?`<ul>${kids.map(k2=>_tNode(k2,d+1)).join('')}</ul>`:''}</li>`;
}
function ticketsPage(){
  // Mark assigned tickets as viewed when page opens (no rr() — already rendering)
  let _dirty=false;
  (DB.tickets||[]).forEach(t=>{
    if(t.assignedTo===S.uid&&!(t.viewedBy||[]).includes(S.uid)){
      if(!t.viewedBy)t.viewedBy=[];
      t.viewedBy.push(S.uid);
      _dirty=true;
    }
  });
  if(_dirty){
    saveDB();
    // Sync viewed_by to Supabase in background — no rr() here (already in a render)
    (DB.tickets||[]).filter(t=>t.assignedTo===S.uid&&(t.viewedBy||[]).includes(S.uid)).forEach(t=>{
      sb.from('tickets').update({viewed_by:t.viewedBy||[]}).eq('id',t.id).then(()=>{}).catch(()=>{});
    });
    // Schedule badge refresh after render completes
    setTimeout(()=>{_invalidateNotifCache();const c=document.getElementById('content');if(c)c.innerHTML=pageContent();},50);
  }
  // Visibility:
  // Admin — sees all tickets
  // Manager — sees tickets assigned to them OR tickets they created (so they can track)
  // User — sees ONLY tickets assigned to them
  let tickets=(DB.tickets||[]).slice().sort((a,b)=>(b.createdAt||'').localeCompare(a.createdAt||''));
  if(isAdmin()||isSubAdmin()){
    // all tickets — no filter (Super Admin + Admin see everything regardless of escalation)
  } else if(isMgr()){
    // Manager sees: assigned to them + tickets they personally created
    tickets=tickets.filter(t=>t.assignedTo===S.uid);
  } else {
    // Regular user: ONLY tickets assigned directly to them
    tickets=tickets.filter(t=>t.assignedTo===S.uid);
  }

  const f=S.filters;
  const statusFilter=f.tkStatus||'';
  const priorityFilter=f.tkPriority||'';
  if(statusFilter)tickets=tickets.filter(t=>t.status===statusFilter);
  if(priorityFilter)tickets=tickets.filter(t=>t.priority===priorityFilter);

  const open=tickets.filter(t=>t.status==='Open').length;
  const inprog=tickets.filter(t=>t.status==='In Progress').length;
  const resolved=tickets.filter(t=>t.status==='Resolved'||t.status==='Closed').length;

  const priClr={High:'#DC2626',Medium:'#F59E0B',Low:'#6B7280',Critical:'#7C3AED'};
  const priBg={High:'#FEF2F2',Medium:'#FFFBEB',Low:'#F9FAFB',Critical:'#F5F3FF'};

  function tkCard(t){
    const assignee=uById(t.assignedTo);
    const submitter=uById(t.submitterId);
    const cl=clById(t.checklistId);
    const canResolve=can('tickets','resolve')||can('tickets','manage')||(t.assignedTo===S.uid);
    const canDelete=can('tickets','delete');
    return'<div style="background:#fff;border-radius:16px;border:1.5px solid #ECEDF0;padding:16px;border-left:4px solid '+(priClr[t.priority]||'#9CA3AF')+'">'+
      '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px">'+
        '<div style="flex:1;min-width:0">'+
          '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px">'+
            '<span style="font-size:11px;font-weight:800;padding:2px 8px;border-radius:20px;background:'+(priBg[t.priority]||'#F9FAFB')+';color:'+(priClr[t.priority]||'#6B7280')+'">'+esc(t.priority)+'</span>'+
            chip(t.status)+
            '<span style="font-size:11px;color:#9CA3AF">'+fmtS(t.date||t.createdAt?.slice(0,10)||'')+'</span>'+
          '</div>'+
          '<div style="font-size:14px;font-weight:700;color:#15171C;margin-bottom:4px">'+esc(t.title)+'</div>'+
          '<div style="font-size:12px;color:#6B7280;line-height:1.5;white-space:pre-wrap">'+esc(t.description)+'</div>'+
          // Show photo from the linked submission's question response
          (()=>{
            if(!t.questionId||!t.submitterId||!t.date)return'';
            const sub=(DB.submissions||[]).find(s=>s.checklistId===t.checklistId&&s.userId===t.submitterId&&s.date===t.date);
            if(!sub)return'';
            const qr=(sub.questionResponses||[]).find(r=>r.questionId===t.questionId);
            const pl=_qrPhotoList(qr);
            if(!pl.length)return'';
            return'<div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap">'+pl.map(ph=>'<img src="'+esc(ph)+'" loading="lazy" decoding="async" alt="Task response photo" onclick="App._bigImg(this.src)" style="max-width:160px;max-height:110px;border-radius:10px;object-fit:cover;border:1px solid #E5E7EB;cursor:pointer" title="Response photo"/>').join('')+'</div>';
          })()+
        '</div>'+
        (canDelete?'<button onclick="App._delTicket(\''+t.id+'\')" style="width:28px;height:28px;display:grid;place-items:center;border-radius:8px;border:none;background:#FEF2F2;cursor:pointer;color:#DC2626;flex-shrink:0">'+ic('x','w-3.5 h-3.5')+'</button>':'')+
      '</div>'+
      '<div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap;padding-top:10px;border-top:1px solid #F3F4F6">'+
        '<div style="display:flex;align-items:center;gap:6px">'+
          '<span style="font-size:11px;font-weight:600;color:#9CA3AF">Assigned to</span>'+
          '<span style="font-size:12px;font-weight:700;color:#374151">'+(assignee?esc(fullName(assignee)):'Unknown')+'</span>'+
        '</div>'+
        (submitter?'<div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;font-weight:600;color:#9CA3AF">From</span><span style="font-size:12px;font-weight:700;color:#374151">'+esc(fullName(submitter))+'</span></div>':'')+
        (cl?'<div style="display:flex;align-items:center;gap:6px"><span style="font-size:11px;font-weight:600;color:#9CA3AF">Checklist</span><span style="font-size:12px;font-weight:700;color:#374151">'+esc(cl.name)+'</span></div>':'')+
        '<div style="margin-left:auto;display:flex;gap:6px;flex-wrap:wrap">'+
          (canResolve&&t.status==='Open'?`<button onclick="App._tkSetStatus(this)" data-id="${t.id}" data-st="In Progress" style="padding:5px 12px;border-radius:8px;background:#EFF6FF;color:#1D4ED8;font-size:12px;font-weight:600;border:1.5px solid #BFDBFE;cursor:pointer">Start</button>`:'')+
          (canResolve&&t.status==='In Progress'?`<button onclick="App._resolveTicket('${t.id}')" style="padding:5px 12px;border-radius:8px;background:#ECFDF5;color:#047857;font-size:12px;font-weight:600;border:1.5px solid #A7F3D0;cursor:pointer">Resolve</button>`:'')+
          ((canResolve||can('tickets','close'))&&(t.status==='Open'||t.status==='In Progress')?`<button onclick="App._tkSetStatus(this)" data-id="${t.id}" data-st="Closed" style="padding:5px 12px;border-radius:8px;background:#F6F7F8;color:#6B7280;font-size:12px;font-weight:600;border:1.5px solid #E5E7EB;cursor:pointer">Close</button>`:'')+
          ((can('tickets','reopen')||can('tickets','manage'))&&(t.status==='Resolved'||t.status==='Closed')?`<button onclick="App._tkSetStatus(this)" data-id="${t.id}" data-st="Open" style="padding:5px 12px;border-radius:8px;background:#FFF7ED;color:#C2410C;font-size:12px;font-weight:600;border:1.5px solid #FED7AA;cursor:pointer">Reopen</button>`:'')+
        '</div>'+
      '</div>'+
    '</div>';
  }

  return'<div class="fade">'+
    hdr('Tickets','Escalation tickets from checklist responses')+
    // Stats row
    '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px">'+
      statCard('Open',open,'#F97316')+
      statCard('In Progress',inprog,'#3B82F6')+
      statCard('Resolved',resolved,'#0E9F6E')+
    '</div>'+
    // Filters
    '<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">'+
      ['','Open','In Progress','Resolved','Closed'].map(s=>{const on=statusFilter===s;return`<button onclick="App._tkFilter('status','${s}')" style="padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid ${on?'#15171C':'#E5E7EB'};background:${on?'#15171C':'#fff'};color:${on?'#fff':'#6B7280'};cursor:pointer">${s||'All'}</button>`;}).join('')+
      '<div style="width:1px;background:#E5E7EB;margin:0 2px"></div>'+
      ['','High','Medium','Low'].map(p=>{const on=priorityFilter===p;return`<button onclick="App._tkFilter('priority','${p}')" style="padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;border:1.5px solid ${on?'#15171C':'#E5E7EB'};background:${on?'#15171C':'#fff'};color:${on?'#fff':'#6B7280'};cursor:pointer">${p||'All priority'}</button>`;}).join('')+
    '</div>'+
    // List
    (tickets.length?
      '<div style="display:flex;flex-direction:column;gap:10px">'+tickets.map(tkCard).join('')+'</div>':
      empty('ticket','No tickets','Tickets are created automatically when an escalation answer is submitted.')
    )+
  '</div>';
}

    rows=lateSubs.map(s=>{
      const c=clById(s.checklistId);
      return'<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid #F3F4F6">'        +'<div><div style="font-size:13px;font-weight:600">'+(c?esc(c.name):'[Deleted checklist]')+'</div>'        +'<div style="font-size:11px;color:#9CA3AF;margin-top:2px">'+fmtS(s.date)+(s.submittedAt?' · '+new Date(s.submittedAt).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}):'')+'</div></div>'        +chip(s.status)+'</div>';

    rows=tkts.map(t=>{
      const priClr={High:'#DC2626',Medium:'#F59E0B',Low:'#6B7280'};
